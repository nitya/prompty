# -----------------------------
# Material Theme Configuration
# ------------------------------
# red, pink, purple, deep purple, indigo, 
# blue, light blue, cyan, teal, green, light green, 
# lime, yellow, amber, orange, deep orange, brown, 
# grey, blue grey , black, white
#    primary: pink # teal
#    accent: indigo
#
# *** FONT ***
# Guide: https://squidfunk.github.io/mkdocs-material/setup/changing-the-fonts/?h=fonts
# Google Fonts Supported: https://fonts.google.com/
#
# *** BLOG ***
# https://squidfunk.github.io/mkdocs-material/setup/setting-up-a-blog/
# ---------------------------------

# Project information
site_name: Prompty For Devs
site_url: https://nitya.github.io/prompty/
site_author: Nitya Narasimhan
site_description: >-
  Exploring Prompty usage one code-first tutorial at a time

# Repository
repo_name: nitya/prompty
repo_url: https://github.com/nitya/prompty

# Copyright
copyright: Copyright &copy; 2024 - present Nitya Narasimhan

# Configuration
site_name: "Prompty For Devs"
theme:
  name: material

  font:
    code: Roboto Mono #Monospaced
    text: Roboto #Regular

  logo: img/prompty.svg

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: pink
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.tabs
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.tracking

# Configure Navigation 
nav:
  - index.md
  - Recent Posts:
    - blog/index.md

# Configure Plugins
plugins:
  - blog
  - rss:
      match_path: blog/posts/.* 
      date_from_meta:
        as_creation: date
      categories:
        - categories
        - tags
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

# Configure Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      
# Page tree
nav:
  - Home: index.md
  - Concepts: 
    - concepts/00.md
    - concepts/01.md
    - concepts/02.md
    - concepts/03.md
  - Tutorials: 
    - tutorials/index.md
  - Blog:
    - blog/index.md